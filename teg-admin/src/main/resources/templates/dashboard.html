<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('TEG Admin - 대시보드')}">
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
    <!-- 서버 상태 -->
    <section class="card">
        <h2 class="card-title">서버 상태</h2>
        <div class="status-grid">
            <div class="status-item">
                <span class="status-label">상태</span>
                <span th:if="${online}" class="status-badge online">온라인</span>
                <span th:unless="${online}" class="status-badge offline">오프라인</span>
            </div>
            <div class="status-item">
                <span class="status-label">컨테이너</span>
                <span class="status-value" th:text="${containerState}">알 수 없음</span>
            </div>
            <div class="status-item">
                <span class="status-label">가동 시간</span>
                <span class="status-value" th:text="${uptime != '' ? uptime : '-'}">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">접속자</span>
                <span class="status-value" th:text="${playerCount}">0</span>
            </div>
        </div>
    </section>

    <!-- 접속 중인 플레이어 -->
    <section class="card">
        <h2 class="card-title">접속 중인 플레이어</h2>
        <div id="player-list-container">
            <div th:if="${#lists.isEmpty(players)}" class="empty-state">
                접속 중인 플레이어가 없습니다
            </div>
            <ul th:unless="${#lists.isEmpty(players)}" class="player-list">
                <li th:each="player : ${players}" class="player-item" th:text="${player}"></li>
            </ul>
        </div>
    </section>

    <!-- 서버 제어 -->
    <section class="card">
        <h2 class="card-title">서버 제어</h2>
        <div class="control-buttons">
            <button id="btn-start" class="btn btn-start" onclick="controlServer('start')">서버 시작</button>
            <button id="btn-stop" class="btn btn-stop" onclick="controlServer('stop')">서버 중지</button>
            <button id="btn-restart" class="btn btn-restart" onclick="controlServer('restart')">서버 재시작</button>
        </div>
        <div id="control-message" class="control-message"></div>
    </section>

    <!-- RCON 콘솔 -->
    <section class="card">
        <h2 class="card-title">RCON 콘솔</h2>
        <div id="console-output" class="console-output"></div>
        <form id="rcon-form" class="console-input-wrapper">
            <input type="text" id="rcon-input" class="console-input"
                   placeholder="명령어를 입력하세요..." autocomplete="off">
            <button type="submit" class="btn btn-primary">전송</button>
        </form>
    </section>

    <!-- 서버 로그 -->
    <section class="card">
        <h2 class="card-title">서버 로그</h2>
        <div id="server-log-output" class="console-output"></div>
        <div class="log-controls">
            <button id="btn-log-connect" class="btn btn-primary" onclick="toggleLogStream()">로그 연결</button>
            <button class="btn btn-secondary" onclick="clearLogs()">로그 지우기</button>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
