services:
  minecraft:
    image: ${MC_IMAGE:-ghcr.io/ldg030201/mc-server:latest}
    pull_policy: ${MC_PULL:-always}
    container_name: mc-ms
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: "ARCLIGHT"
      ARCLIGHT_TYPE: "NEOFORGE"
      VERSION: "1.21.1"
      MEMORY: "6G"
      TZ: "Asia/Seoul"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      RCON_PORT: 25575
    tty: true
    stdin_open: true
    volumes:
      - mc-data:/data
      - ./user/mods:/mods:ro
      - ./plugin:/plugins:ro

  teg-admin:
    image: ${TEG_ADMIN_IMAGE:-ghcr.io/ldg030201/teg-admin:latest}
    pull_policy: ${TEG_ADMIN_PULL:-always}
    build:
      context: .
      dockerfile: teg-admin/Dockerfile
    container_name: teg-admin
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mc-data:/mc-data:ro
    environment:
      RCON_HOST: minecraft
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD}"
      MC_CONTAINER_NAME: mc-ms
    depends_on:
      - minecraft

volumes:
  mc-data:
